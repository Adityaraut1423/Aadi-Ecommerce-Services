spring.application.name=ECommenrce-Website-SB

# --- START OF LIVE DATABASE CONNECTION ---
# Replace [MYSQLHOST], [MYSQLPORT], and [MYSQLDATABASE] from Railway
spring.datasource.url=jdbc:mysql://[MYSQLHOST]:[MYSQLPORT]/[MYSQLDATABASE]?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# Replace [MYSQLUSER] (usually root)
spring.datasource.username=[MYSQLUSER]

# Replace [MYSQLPASSWORD] (the long random string)
spring.datasource.password=[MYSQLPASSWORD]
# --- END OF LIVE DATABASE CONNECTION ---

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Change this from 8083 to 8080
server.port=8080