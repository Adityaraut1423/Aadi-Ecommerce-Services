<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Hub | Aadi Store</title>
    <!-- Core UI Variables Setup -->
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #2563eb;
            --sky-blue: #38bdf8;
            --dark-slate: #0f172a;
            --muted-slate: #334155;
            --gray-cool: #f5f7fb;
            --border-light: #cbd5e1;
            --border-extra-light: #e2e8f0;
            --text-muted: #64748b;
            --success-green: #16a34a;
            --success-hover: #15803d;
            --danger-red: #ef4444;
            --danger-light: #fee2e2;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);
            --shadow-md: 0 5px 15px rgba(0,0,0,0.05);
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --radius-sm: 6px;
            --radius-md: 12px;
            --transition-speed: 0.25s;
        }

        /* RESET SYSTEM ENGINE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--gray-cool);
            color: var(--muted-slate);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* FIXED NOTIFICATION DECK LAYER */
        #notificationConsole {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            width: calc(100% - 48px);
        }

        .toast-banner {
            background: white;
            border-left: 4px solid var(--accent-blue);
            padding: 16px 20px;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideInRight var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .toast-banner.success { border-left-color: var(--success-green); }
        .toast-banner.danger { border-left-color: var(--danger-red); }
        
        @keyframes slideInRight {
            from { transform: translateX(120%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* NAVBAR CORE */
        nav {
            position: sticky;
            top: 0;
            z-index: 2000;
            background: var(--primary-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            height: 80px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            color: white;
            font-size: 26px;
            font-weight: 800;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo-tag {
            background: rgba(255,255,255,0.15);
            color: var(--sky-blue);
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .search-box {
            display: flex;
            width: 380px;
            box-shadow: var(--shadow-sm);
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            outline: none;
            border-radius: var(--radius-sm) 0 0 var(--radius-sm);
            font-size: 14px;
        }

        .search-box button {
            border: none;
            padding: 0 20px;
            cursor: pointer;
            background: var(--sky-blue);
            color: var(--dark-slate);
            font-weight: bold;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            transition: background var(--transition-speed);
        }

        .search-box button:hover {
            background: #7dd3fc;
        }

        nav ul {
            list-style: none;
            display: flex;
            align-items: center;
        }

        nav ul li a {
            text-decoration: none;
            color: rgba(255,255,255,0.8);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 15px;
            transition: all var(--transition-speed);
        }

        nav ul li a:hover {
            color: white;
            background: rgba(255,255,255,0.08);
        }

        nav ul li a.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(37,99,235,0.2);
        }

        /* MAIN SECTION STACK */
        main {
            flex: 1;
            width: 85%;
            max-width: 1400px;
            margin: 50px auto;
        }

        .catalog-header-block {
            margin-bottom: 36px;
            text-align: center;
        }

        .page-title {
            font-size: 34px;
            color: var(--dark-slate);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .subtitle-trail {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* UTILITY FILTER DECK BAR */
        .filter-control-deck {
            background: white;
            padding: 18px 30px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-extra-light);
            margin-bottom: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 700;
            color: var(--dark-slate);
        }

        .filter-group select {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            outline: none;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        /* LOADING MICRO-SHIMMER SKELETON ENGINE */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .skeleton-card {
            background: white;
            height: 420px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .shimmer-block {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmerEffect 1.6s infinite linear;
            border-radius: var(--radius-sm);
        }

        .shimmer-img { height: 200px; }
        .shimmer-title { height: 24px; width: 70%; }
        .shimmer-text { height: 50px; }
        .shimmer-btn { height: 44px; margin-top: auto; }

        @keyframes shimmerEffect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* CARD CATALOG PLATFORM */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 35px;
            margin-bottom: 50px;
        }

        .card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-extra-light);
            transition: all var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-light);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-extra-light);
            background-color: var(--gray-cool);
            transition: transform 0.3s ease;
        }

        .card:hover .card-img {
            transform: scale(1.03);
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-slate);
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
            flex: 1;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid var(--border-extra-light);
        }

        .price {
            color: var(--accent-blue);
            font-size: 22px;
            font-weight: 800;
        }

        .add-to-cart-btn {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            background: var(--success-green);
            color: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(22,163,74,0.1);
            transition: all var(--transition-speed);
        }

        .add-to-cart-btn:hover {
            background: var(--success-hover);
            box-shadow: 0 6px 16px rgba(22,163,74,0.2);
        }

        /* FOOTER MODULE */
        footer {
            background: var(--dark-slate);
            color: var(--text-muted);
            padding: 30px 0;
            text-align: center;
            font-size: 14px;
            border-top: 1px solid rgba(255,255,255,0.05);
            margin-top: auto;
        }

        @media (max-width: 992px) {
            main { width: 90%; }
            nav { padding: 0 30px; }
        }

        @media (max-width: 768px) {
            nav { height: auto; padding: 20px; flex-direction: column; gap: 15px; }
            .search-box { width: 100%; }
            nav ul { width: 100%; justify-content: center; margin-top: 5px; }
            .filter-control-deck { flex-direction: column; align-items: stretch; padding: 20px; }
            .filter-group select { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- NOTIFICATION MODAL TOAST STACK -->
    <div id="notificationConsole" role="alert"></div>

    <header>
        <nav role="navigation" aria-label="Master Store Navigation">
            <div class="logo-wrapper">
                <a href="index.html" class="logo">Aadi Store</a>
                <span class="logo-tag">Catalog</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search product catalogs by name..." oninput="filterProducts()">
                <button type="button">🔍</button>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="orders.html">My Orders</a></li>
                <li id="authLink"><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="catalog-header-block">
            <h1 class="page-title">Explore Global Catalogs</h1>
            <div class="subtitle-trail">Live relational query connections mapping directly to system database storage records</div>
        </div>

        <!-- REFINEMENT FILTERS ENGINE TOOLBAR -->
        <section class="filter-control-deck" aria-label="Catalog Filters">
            <div class="filter-group">
                <label for="priceSortSelect">Organize Distribution:</label>
                <select id="priceSortSelect" onchange="sortProducts()">
                    <option value="default">Database Default Ordering</option>
                    <option value="low-high">Price Valuation: Low to High</option>
                    <option value="high-low">Price Valuation: High to Low</option>
                </select>
            </div>
        </section>
        
        <!-- MICRO-SHIMMER LOAD SCREEN INDICATOR -->
        <section id="shimmerInstanceGrid" class="skeleton-grid">
            <div class="skeleton-card"><div class="shimmer-block shimmer-img"></div><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-text"></div><div class="shimmer-block shimmer-btn"></div></div>
            <div class="skeleton-card"><div class="shimmer-block shimmer-img"></div><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-text"></div><div class="shimmer-block shimmer-btn"></div></div>
            <div class="skeleton-card"><div class="shimmer-block shimmer-img"></div><div class="shimmer-block shimmer-title"></div><div class="shimmer-block shimmer-text"></div><div class="shimmer-block shimmer-btn"></div></div>
        </section>
        
        <!-- Active Target Injections Container Grid Node -->
        <section class="products-grid" id="productsContainer" style="display: none;"></section>
    </main>

    <footer>
        <div style="max-width: 1400px; margin: 0 auto; width: 85%;">
            &copy; 2026 Aadi Store | Automated Database Distribution Mapping Engine.
        </div>
    </footer>

    <!-- RUNTIME DATA ROUTER PIPELINE ENGINES -->
    <script>
        // Automatic Backend URL selection (Local vs Production)
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8080'
            : 'https://aadi-ecommerce-services-1.onrender.com';

        let allProducts = [];

        // Currency Formatter for Indian Rupee
        const currencyFormatter = new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            maximumFractionDigits: 0
        });

        // Dynamic Auth Navbar Display
        function applySmartNavbar() {
            const sessionData = localStorage.getItem('sessionUser');
            const authLinkNode = document.getElementById('authLink');
            
            if (sessionData && authLinkNode) {
                const activeUser = JSON.parse(sessionData);
                authLinkNode.innerHTML = `
                    <a href="#" onclick="executeSystemLogout()" style="background: #ef4444; color: white;">
                        Logout (${activeUser.name ? activeUser.name.split(' ')[0] : 'User'})
                    </a>
                `;
            }
        }

        window.executeSystemLogout = function() {
            if (confirm("Are you sure you want to log out?")) {
                localStorage.removeItem('sessionUser');
                window.location.reload();
            }
        };

        async function fetchAndDisplayProducts() {
            const shimmerGrid = document.getElementById('shimmerInstanceGrid');
            const productsContainer = document.getElementById('productsContainer');
            
            try {
                const response = await fetch(`${API_BASE_URL}/api/products`);
                
                if (!response.ok) {
                    throw new Error('Server returned status: ' + response.status);
                }

                allProducts = await response.json();
                
                // Hide shimmer loader and show grid
                shimmerGrid.style.display = 'none';
                productsContainer.style.display = 'grid';

                renderProducts(allProducts);

            } catch (error) {
                console.error('Error fetching products:', error);
                shimmerGrid.innerHTML = `<p style="color: var(--danger-red); text-align: center; grid-column: 1/-1; padding: 40px; background: white; border-radius: 12px;">Failed to load products. Make sure your Spring Boot backend is running.</p>`;
            }
        }

        function renderProducts(productsToRender) {
            const productsContainer = document.getElementById('productsContainer');
            productsContainer.innerHTML = '';

            if (productsToRender.length === 0) {
                productsContainer.innerHTML = `<p style="text-align: center; grid-column: 1/-1; padding: 40px; background: white; border-radius: 12px; color: #64748b;">No products found matching your criteria.</p>`;
                return;
            }

            productsToRender.forEach(product => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Fallback image in case external URL fails
                const fallbackImage = 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=600';
                
                // Correctly references product.imageUrl (matching Spring Boot JSON)
                const imageSrc = (product.imageUrl && product.imageUrl.trim() !== '') 
                    ? product.imageUrl 
                    : fallbackImage;
                
                card.innerHTML = `
                    <img class="card-img" src="${imageSrc}" alt="${product.name}" onerror="this.src='${fallbackImage}'">
                    <div class="card-body">
                        <h3>${product.name}</h3>
                        <p>${product.description || 'No description available for this catalog item.'}</p>
                        <div class="price-row">
                            <span class="price">${currencyFormatter.format(product.price)}</span>
                        </div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                `;
                productsContainer.appendChild(card);
            });
        }

        function sortProducts() {
            const sortValue = document.getElementById('priceSortSelect').value;
            let sortedArray = [...allProducts];

            if (sortValue === 'low-high') {
                sortedArray.sort((a, b) => a.price - b.price);
            } else if (sortValue === 'high-low') {
                sortedArray.sort((a, b) => b.price - a.price);
            }

            renderProducts(sortedArray);
        }

        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filteredArray = allProducts.filter(product => 
                product.name.toLowerCase().includes(searchTerm) || 
                (product.description && product.description.toLowerCase().includes(searchTerm))
            );
            renderProducts(filteredArray);
        }

        // 🔒 AUTHENTICATION GUARD: Require login before adding to cart
        async function addToCart(productId) {
            const sessionData = localStorage.getItem('sessionUser');
            
            if (!sessionData) {
                alert('🔑 Please login to buy products and add items to your cart!');
                window.location.href = 'login.html';
                return;
            }

            const currentUser = JSON.parse(sessionData);

            try {
                const response = await fetch(`${API_BASE_URL}/api/cart/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        productId: productId,
                        quantity: 1
                    })
                });

                if (response.ok) {
                    alert('🎉 Product added to cart successfully!');
                } else {
                    alert('Failed to add product to cart. Please check backend connection.');
                }
            } catch (err) {
                console.error("Cart API Error:", err);
                alert("Error connecting to server.");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            applySmartNavbar();
            fetchAndDisplayProducts();
        });
    </script>
</body>
</html>
