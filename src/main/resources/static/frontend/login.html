<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aadi Store</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #2563eb;
            --dark-slate: #0f172a;
            --gray-cool: #f5f7fb;
            --danger-red: #ef4444;
            --radius-md: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--gray-cool); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: var(--radius-md); box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .login-card h2 { font-size: 24px; color: var(--dark-slate); margin-bottom: 8px; }
        .login-card p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--dark-slate); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus { border-color: var(--accent-blue); }
        .btn-submit { width: 100%; padding: 14px; background: var(--accent-blue); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-submit:hover { background: var(--primary-blue); }
        .error-banner { background: #fee2e2; color: var(--danger-red); padding: 10px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 20px; display: none; }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .toggle-link a { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <p>Enter your credentials to access your account.</p>

        <div id="errorMessage" class="error-banner">Invalid email or password.</div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input type="email" id="loginEmail" required placeholder="adityaraut@gmail.com">
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">Sign In to Account</button>
        </form>

        <div class="toggle-link">
            Don't have an account? <a href="register.html">Create one here →</a>
        </div>
    </div>

    <script>
        // Dynamic Backend Host Detection
        const BACKEND_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8080'
            : 'https://aadi-ecommerce-services-1.onrender.com';

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const emailInput = document.getElementById('loginEmail').value.trim();
            const passwordInput = document.getElementById('loginPassword').value.trim();
            const errorBanner = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');

            errorBanner.style.display = 'none';
            submitBtn.textContent = 'Authenticating...';
            submitBtn.disabled = true;

            try {
                // 🌟 UPDATED FIX: Changed endpoint to /api/auth/login
                const response = await fetch(`${BACKEND_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: emailInput,
                        password: passwordInput
                    })
                });

                if (!response.ok) {
                    throw new Error("Authentication failed");
                }

                const userData = await response.json();

                // Store active profile session context locally
                localStorage.setItem('sessionUser', JSON.stringify(userData));

                // If user is Admin, redirect to admin console, otherwise go to products catalog
                const userRole = (userData.role || '').toUpperCase();
                if (userRole.includes('ADMIN')) {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'products.html';
                }

            } catch (err) {
                console.error("Login anomaly caught:", err);
                errorBanner.style.display = 'block';
                errorBanner.textContent = 'Invalid email or password.';
            } finally {
                submitBtn.textContent = 'Sign In to Account';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
