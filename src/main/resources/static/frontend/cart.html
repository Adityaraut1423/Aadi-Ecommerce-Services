<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart | Aadi Store</title>
    <style>
        :root {
            --primary-blue: #1e3a8a;
            --accent-blue: #2563eb;
            --dark-slate: #0f172a;
            --gray-bg: #f8fafc;
            --border-color: #e2e8f0;
            --danger-red: #ef4444;
            --success-green: #10b981;
            --radius-md: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--gray-bg); color: var(--dark-slate); min-height: 100vh; display: flex; flex-direction: column; }

        /* Navigation Bar */
        .navbar { background: white; border-bottom: 1px solid var(--border-color); padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; }
        .navbar .brand { font-size: 20px; font-weight: 700; color: var(--primary-blue); text-decoration: none; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: #64748b; font-weight: 600; font-size: 14px; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent-blue); }
        .user-greeting { font-size: 14px; font-weight: 600; color: var(--primary-blue); background: #eff6ff; padding: 6px 12px; border-radius: 20px; }

        /* Container */
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; flex-content: 1; width: 100%; }
        .page-title { font-size: 26px; font-weight: 700; margin-bottom: 24px; }

        /* Cart Layout */
        .cart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        @media (max-width: 768px) { .cart-grid { grid-template-columns: 1fr; } }

        /* Cart Items List */
        .cart-card { background: white; border-radius: var(--radius-md); border: 1px solid var(--border-color); padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .cart-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-color); }
        .cart-item:last-child { border-bottom: none; }
        .item-details { display: flex; align-items: center; gap: 16px; }
        .item-img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; background: #f1f5f9; }
        .item-title { font-size: 16px; font-weight: 600; color: var(--dark-slate); margin-bottom: 4px; }
        .item-price { font-size: 14px; color: #64748b; }
        .item-actions { display: flex; align-items: center; gap: 16px; }
        .qty-badge { background: #f1f5f9; padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 14px; }
        .btn-remove { background: none; border: none; color: var(--danger-red); font-weight: 600; cursor: pointer; font-size: 13px; }
        .btn-remove:hover { text-decoration: underline; }

        /* Order Summary Card */
        .summary-card { background: white; border-radius: var(--radius-md); border: 1px solid var(--border-color); padding: 24px; height: fit-content; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .summary-card h3 { font-size: 18px; margin-bottom: 16px; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: #64748b; }
        .summary-row.total { font-size: 18px; font-weight: 700; color: var(--dark-slate); border-top: 1px solid var(--border-color); padding-top: 12px; margin-top: 12px; }
        .btn-checkout { width: 100%; padding: 14px; background: var(--accent-blue); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background 0.2s; text-align: center; text-decoration: none; display: block; margin-top: 16px; }
        .btn-checkout:hover { background: var(--primary-blue); }

        /* Empty State */
        .empty-cart { text-align: center; padding: 60px 20px; background: white; border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .empty-icon { font-size: 48px; margin-bottom: 16px; }
        .empty-cart h3 { font-size: 20px; margin-bottom: 8px; }
        .empty-cart p { color: #64748b; margin-bottom: 24px; font-size: 14px; }
        .btn-shop { padding: 12px 24px; background: var(--accent-blue); color: white; text-decoration: none; border-radius: 8px; font-weight: 600; display: inline-block; }

        footer { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; margin-top: auto; }
    </style>
</head>
<body>

    <!-- Navigation Header -->
    <nav class="navbar">
        <a href="index.html" class="brand">Aadi Store</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="orders.html">My Orders</a>
            <span id="userGreeting" class="user-greeting" style="display: none;"></span>
            <a href="#" id="logoutBtn" style="display: none; color: var(--danger-red);">Logout</a>
            <a href="login.html" id="loginNavBtn">Login</a>
        </div>
    </nav>

    <!-- Main Content Container -->
    <div class="container">
        <h1 class="page-title">Shopping Cart</h1>

        <!-- Loaded State Container -->
        <div id="cartView" class="cart-grid" style="display: none;">
            <div class="cart-card">
                <div id="cartItemsList"></div>
            </div>

            <div class="summary-card">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotalPrice">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total">
                    <span>Total Amount</span>
                    <span id="totalPrice">₹0.00</span>
                </div>
                <a href="checkout.html" class="btn-checkout">Proceed to Checkout →</a>
            </div>
        </div>

        <!-- Empty State Container -->
        <div id="emptyCartView" class="empty-cart" style="display: none;">
            <div class="empty-icon">🛒</div>
            <h3>Your Cart is Currently Empty</h3>
            <p>You haven't added any products to your cart yet.</p>
            <a href="products.html" class="btn-shop">Explore Products</a>
        </div>
    </div>

    <footer>
        © 2026 Aadi Store. All rights reserved.
    </footer>

    <script>
        // Dynamic Backend Host Resolution
        const BACKEND_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8080'
            : 'https://aadi-ecommerce-services-1.onrender.com';

        document.addEventListener('DOMContentLoaded', async () => {
            const sessionUserRaw = localStorage.getItem('sessionUser');
            
            // 1. Session Context Verification
            if (!sessionUserRaw) {
                alert("Please log in to view your shopping cart.");
                window.location.href = 'login.html';
                return;
            }

            const sessionUser = JSON.parse(sessionUserRaw);

            // Update Navbar User Status
            if (sessionUser && sessionUser.name) {
                document.getElementById('userGreeting').style.display = 'inline-block';
                document.getElementById('userGreeting').textContent = `Hi, ${sessionUser.name}`;
                document.getElementById('logoutBtn').style.display = 'inline-block';
                document.getElementById('loginNavBtn').style.display = 'none';
            }

            // Logout Functionality
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                localStorage.removeItem('sessionUser');
                window.location.href = 'login.html';
            });

            // 2. Fetch User-Specific Cart Items
            await fetchUserCart(sessionUser.id);
        });

        async function fetchUserCart(userId) {
            try {
                const response = await fetch(`${BACKEND_BASE}/api/cart/user/${userId}`);
                
                if (!response.ok) {
                    throw new Error("Failed to load cart items");
                }

                const cartItems = await response.json();

                if (Array.isArray(cartItems) && cartItems.length > 0) {
                    renderCartItems(cartItems);
                } else {
                    showEmptyCart();
                }
            } catch (err) {
                console.error("Cart loading error:", err);
                showEmptyCart();
            }
        }

        function renderCartItems(items) {
            const cartContainer = document.getElementById('cartItemsList');
            cartContainer.innerHTML = '';
            let totalSum = 0;

            items.forEach(item => {
                // Handling structure variations between Spring Boot DTOs/Entities
                const product = item.product || item;
                const price = product.price || 0;
                const quantity = item.quantity || 1;
                const cartId = item.id;

                totalSum += price * quantity;

                const itemRow = document.createElement('div');
                itemRow.className = 'cart-item';
                itemRow.innerHTML = `
                    <div class="item-details">
                        <img src="${product.imageUrl || 'https://via.placeholder.com/64'}" alt="${product.name}" class="item-img" onerror="this.src='https://via.placeholder.com/64'">
                        <div>
                            <div class="item-title">${product.name}</div>
                            <div class="item-price">₹${price.toLocaleString('en-IN')}</div>
                        </div>
                    </div>
                    <div class="item-actions">
                        <span class="qty-badge">Qty: ${quantity}</span>
                        <button class="btn-remove" onclick="removeCartItem(${cartId})">Remove</button>
                    </div>
                `;
                cartContainer.appendChild(itemRow);
            });

            document.getElementById('subtotalPrice').textContent = `₹${totalSum.toLocaleString('en-IN')}`;
            document.getElementById('totalPrice').textContent = `₹${totalSum.toLocaleString('en-IN')}`;

            document.getElementById('cartView').style.display = 'grid';
            document.getElementById('emptyCartView').style.display = 'none';
        }

        function showEmptyCart() {
            document.getElementById('cartView').style.display = 'none';
            document.getElementById('emptyCartView').style.display = 'block';
        }

        async function removeCartItem(cartId) {
            if (!confirm("Remove item from cart?")) return;

            try {
                const response = await fetch(`${BACKEND_BASE}/api/cart/${cartId}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    const sessionUser = JSON.parse(localStorage.getItem('sessionUser'));
                    fetchUserCart(sessionUser.id);
                } else {
                    alert("Unable to remove item.");
                }
            } catch (err) {
                console.error("Delete cart item error:", err);
            }
        }
    </script>
</body>
</html>
